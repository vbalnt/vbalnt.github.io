function filterPosts(tag, btn) {
  var buttons = document.querySelectorAll('.tag-btn');

    buttons[i].classList.remove('active');
  }
  btn.classList.add('active');

  for (var j = 0; j < posts.length; j++) {
    var postTags = posts[j].getAttribute('data-tags') || '';
    if (tag === 'all') {
      posts[j].classList.remove('hidden');
    } else {
      if (postTags.indexOf(tag) !== -1) {
        posts[j].classList.remove('hidden');
      } else {
        posts[j].classList.add('hidden');
      }
    }
  }
}
